name: EPC ISO 20022 Daily Briefing

on:
  schedule:
    - cron: '0 7 * * 1-5'
  workflow_dispatch:

jobs:
  run-agent:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic

      - name: Run EPC agent
        run: python epc_agent.py --output docs/index.html
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit and push
        run: |
          git config user.name "EPC Agent"
          git config user.email "agent@noreply.github.com"
          git add docs/
          git diff --cached --quiet || git commit -m "Daily EPC briefing $(date -u +%Y-%m-%d)"
          git push
